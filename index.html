  <style>
:root {
  --navy: #0D2540;
  --navy-2: #173A5B;
  --teal: #2E7D7B;
  --teal-soft: #DDECEA;
  --green: #3F5F44;
  --green-soft: #E3E9E4;
  --cream: #F7F3EA;
  --cream-2: #EFE9DC;
  --stone: #8E979D;
  --ink: #182536;
  --muted: #647181;
  --white: #FFFFFF;
  --danger: #9F3C38;
  --warning: #A56D1A;
  --border: rgba(13, 37, 64, 0.12);
  --shadow: 0 18px 48px rgba(13, 37, 64, 0.13);
  --radius: 18px;
  --sidebar-width: 260px;
}

* { box-sizing: border-box; }

html { min-height: 100%; background: var(--cream); }

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  background: var(--cream);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
img { display: block; max-width: 100%; }
.hidden { display: none !important; }

h1, h2, h3, h4, p { margin-top: 0; }
h1, h2, h3 { color: var(--navy); }
h1 { margin-bottom: 12px; font-size: clamp(2rem, 5vw, 3.3rem); line-height: 1.02; letter-spacing: -0.045em; }
h2 { margin-bottom: 8px; font-size: clamp(1.65rem, 3vw, 2.35rem); line-height: 1.08; letter-spacing: -0.035em; }
h3 { margin-bottom: 8px; font-size: 1.12rem; }
.muted { color: var(--muted); }
.eyebrow {
  margin-bottom: 8px;
  color: var(--teal);
  font-size: 0.74rem;
  font-weight: 900;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.onboarding-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 12% 10%, rgba(46,125,123,.16), transparent 30%),
    radial-gradient(circle at 88% 90%, rgba(63,95,68,.12), transparent 28%),
    var(--cream);
}

.onboarding-card {
  width: min(100%, 560px);
  padding: clamp(26px, 5vw, 48px);
  background: rgba(255,255,255,.82);
  border: 1px solid var(--border);
  border-radius: 28px;
  box-shadow: var(--shadow);
}

.onboarding-logo {
  width: 88px;
  height: 88px;
  margin-bottom: 24px;
  border-radius: 22px;
}

.stack-form, .form-grid { display: grid; gap: 16px; }
.form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

label {
  display: grid;
  gap: 7px;
  color: var(--navy);
  font-size: .88rem;

.topbar-actions { display: flex; align-items: center; gap: 10px; }

.icon-button, .profile-button {

.main-content { padding: clamp(18px, 3vw, 36px); }

.page-header {

.header-actions { display: flex; flex-wrap: wrap; gap: 10px; }

.stats-grid {

}

.stat-card {

}

.stat-card .label { color: var(--muted); font-size: .78rem; font-weight: 800; }

.dashboard-grid {

  grid-template-columns: minmax(0, 1.3fr) minmax(300px, .7fr);

}

.panel {

  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.panel-header {

  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}

.panel-header h3 { margin: 0; }

.list { display: grid; gap: 10px; }
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px;
  background: var(--white);
  border: 1px solid rgba(13,37,64,.08);

}

.list-item-main { flex: 1; min-width: 0; }
.list-item-main strong, .list-item-main span { display: block; }
.list-item-main strong { color: var(--navy); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.list-icon {

  height: 38px;

}

.empty-state {

}

.toolbar {

  grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(130px, 190px));

}

.cards-grid {

  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.animal-card {

}

.animal-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
.animal-avatar {

  background: var(--navy);

}
.animal-card h3 { margin: 14px 0 4px; }
.animal-card .meta { color: var(--muted); font-size: .82rem; }
.animal-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid rgba(13,37,64,.08);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 9px;
  color: var(--navy);
  background: var(--teal-soft);
  border-radius: 999px;
  font-size: .72rem;
  font-weight: 850;
}

.badge.green { color: var(--green); background: var(--green-soft); }
.badge.gray { color: #56616B; background: #E8ECEE; }
.badge.warning { color: #7B4E10; background: #F5E7CE; }
.badge.danger { color: #832D29; background: #F3DBD9; }

.data-table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 13px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
.data-table th { color: var(--muted); font-size: .72rem; letter-spacing: .07em; text-transform: uppercase; }
.data-table td { font-size: .88rem; }
.data-table tbody tr:hover { background: rgba(255,255,255,.55); }

.task-check {
  width: 20px;
  height: 20px;
  accent-color: var(--teal);
}

.progress-track { height: 8px; background: #E5E9EA; border-radius: 999px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--teal); border-radius: 999px; }

.settings-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
.settings-card {
  padding: 20px;
  background: rgba(255,255,255,.74);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.settings-card h3 { margin-bottom: 4px; }
.settings-card p { color: var(--muted); font-size: .88rem; }
.action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(6,21,36,.64);
  backdrop-filter: blur(6px);
}

.modal {
  width: min(100%, 760px);
  max-height: min(90vh, 920px);
  overflow: auto;
  padding: 24px;
  background: var(--cream);
  border-radius: 24px;
  box-shadow: 0 30px 90px rgba(0,0,0,.28);
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}

.modal-header h2 { margin: 0; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

.detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
.detail-field { padding: 12px; background: rgba(255,255,255,.6); border: 1px solid var(--border); border-radius: 12px; }
.detail-field small, .detail-field strong { display: block; }
.detail-field small { color: var(--muted); }
.detail-field strong { margin-top: 3px; color: var(--navy); }


.pedigree-import-grid {
  display: grid;
  gap: 16px;
}

.pedigree-source-box {
  padding: 16px;
  background: rgba(255,255,255,.64);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.pedigree-source-preview {
  min-height: 140px;
  display: grid;
  place-items: center;
  margin-top: 12px;
  padding: 12px;
  overflow: hidden;
  color: var(--muted);
  background: white;
  border: 1px dashed rgba(13,37,64,.2);
  border-radius: 14px;
  text-align: center;
}

.pedigree-source-preview img {
  max-height: 360px;
  object-fit: contain;
  border-radius: 10px;
}

.pedigree-source-preview object {
  width: 100%;
  height: 420px;
  border: 0;
  border-radius: 10px;
}

.pedigree-generation {
  padding: 14px;
  background: rgba(255,255,255,.55);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.pedigree-generation > summary {
  padding: 3px;
  color: var(--navy);
  font-weight: 900;
}

.ancestor-grid {
  display: grid;
  grid-template-columns: repeat(2,minmax(0,1fr));
  gap: 12px;
  margin-top: 14px;
}

.ancestor-card {
  padding: 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
}

.ancestor-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.ancestor-card-header strong {
  color: var(--navy);
}

.ancestor-fields {
  display: grid;
  grid-template-columns: repeat(2,minmax(0,1fr));
  gap: 10px;
}

.ancestor-fields label {
  font-size: .78rem;
}

.match-hint {
  min-height: 22px;
  margin-top: 8px;
  color: var(--warning);
  font-size: .78rem;
  font-weight: 800;
}

.match-hint button {
  margin-left: 6px;
  padding: 3px 7px;
  color: white;
  background: var(--warning);
  border: 0;
  border-radius: 7px;
  font-size: .72rem;
  font-weight: 900;
}

.pedigree-warning {
  padding: 12px;
  color: #704815;
  background: #F7E9CF;
  border: 1px solid #E4C78F;
  border-radius: 12px;
  font-size: .84rem;
}

.pedigree-document-card {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 12px;
}

.pedigree-document-icon {
  width: 52px;
  height: 52px;
  display: grid;
  place-items: center;
  color: white;
  background: var(--navy);
  border-radius: 14px;
  font-size: 1.35rem;
}

.modal.modal-wide {
  width: min(100%, 1180px);
}

@media (max-width: 760px) {
  .ancestor-grid,
  .ancestor-fields {
    grid-template-columns: 1fr;
  }

  .pedigree-document-card {
    grid-template-columns: 48px 1fr;
  }

  .pedigree-document-card .list-item-actions {
    grid-column: 1 / -1;
  }
}

.pedigree-grid {
  display: grid;
  grid-template-columns: .8fr 1fr 1fr;
  gap: 10px;
  align-items: center;
  margin-top: 14px;
}
.pedigree-cell {
  min-height: 74px;
  display: grid;
  place-items: center;
  padding: 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  text-align: center;
}
.pedigree-cell small { color: var(--muted); display: block; }

.toast-region {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 200;
  display: grid;
  gap: 8px;
}

.toast {
  min-width: 260px;
  max-width: 380px;
  padding: 13px 15px;
  color: white;
  background: var(--navy);
  border-radius: 13px;
  box-shadow: var(--shadow);
  font-weight: 750;
  animation: toast-in .2s ease-out;
}

.toast.success { background: var(--green); }
.toast.error { background: var(--danger); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}


.feedback-button {
  min-height: 40px;
  padding: 9px 13px;
  color: white;
  background: var(--green);
  border-color: var(--green);
}

.feedback-button:hover,
.feedback-button:focus-visible {
  background: #344f39;
}

.feedback-short {
  display: none;
}

.feedback-status {
  min-height: 22px;
  margin: 12px 0 0;
  color: var(--muted);
  font-size: .86rem;
  font-weight: 750;
}

.feedback-status.success {
  color: var(--green);
}

.feedback-status.error {
  color: var(--danger);
}

.feedback-privacy {
  padding: 12px;
  color: var(--muted);
  background: rgba(255,255,255,.55);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: .82rem;
}

@media (max-width: 620px) {
  .feedback-button {
    width: 42px;
    min-width: 42px;
    padding: 0;
  }

  .feedback-label {
    display: none;
  }

  .feedback-short {
    display: inline;
    font-size: 1.05rem;
  }
}

@media (max-width: 1120px) {
  .stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .cards-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .toolbar { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 860px) {
  .app-shell { grid-template-columns: 1fr; }
  .workspace { grid-column: 1; }
  .sidebar {
    transform: translateX(-102%);
    transition: transform .2s ease;
    box-shadow: var(--shadow);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-button { display: inline-grid; }
  .dashboard-grid, .settings-grid { grid-template-columns: 1fr; }
  .form-grid.two, .detail-grid { grid-template-columns: 1fr; }
}

@media (max-width: 620px) {
  .main-content { padding: 18px 14px 90px; }
  .topbar { padding-inline: 14px; }
  .topbar .button-ghost { display: none; }
  .page-header { align-items: stretch; flex-direction: column; }
  .header-actions .button { flex: 1; }
  .stats-grid, .cards-grid, .toolbar { grid-template-columns: 1fr; }
  .modal { padding: 18px; border-radius: 20px; }
  .pedigree-grid { grid-template-columns: 1fr; }
}

.file-drop {
  min-height: 170px;
  display: grid;
  place-items: center;
  padding: 24px;
  color: var(--muted);
  background: rgba(255,255,255,.52);
  border: 2px dashed rgba(46,125,123,.32);
  border-radius: 18px;
  text-align: center;
  cursor: pointer;
}
.file-drop:hover,
.file-drop.dragging { background: var(--teal-soft); border-color: var(--teal); }
.file-drop.busy { cursor: wait; opacity: .72; }
.file-drop strong { display: block; color: var(--navy); font-size: 1rem; }
.file-drop small { display: block; margin-top: 5px; }
.file-actions { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }

.ancestor-card {
  padding: 16px;
  background: rgba(255,255,255,.64);
  box-shadow: none;
}
.ancestor-card.linked { border-color: rgba(63,95,68,.38); background: var(--green-soft); }
.ancestor-manual { margin-top: 12px; }
.ancestor-manual summary {
  color: var(--teal);
  font-size: .84rem;
  font-weight: 850;
  cursor: pointer;
}
.ancestor-manual .ancestor-fields { margin-top: 12px; }
.ancestor-tools { display: flex; justify-content: flex-end; margin-top: 10px; }
.text-button {
  padding: 4px 0;
  color: var(--muted);
  background: transparent;
  border: 0;
  font-size: .78rem;
  font-weight: 800;
}
.text-button:hover { color: var(--danger); }

.review-summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
}
.review-summary-card {
  padding: 14px;
  background: rgba(255,255,255,.62);
  border: 1px solid var(--border);
  border-radius: 13px;
}
.review-summary-card small,
.review-summary-card strong { display: block; }
.review-summary-card small { color: var(--muted); }
.review-summary-card strong { margin-top: 3px; color: var(--navy); }

/* Dark mode uses a deliberately balanced HerdHarbor palette, not a simple inversion. */
html[data-theme="dark"] body,
html[data-theme="dark"] .workspace,
html[data-theme="dark"] .main-content { color: #E8EEF2; background: #071827; }
html[data-theme="dark"] .topbar { background: rgba(7,24,39,.94); border-color: rgba(211,226,235,.1); }
html[data-theme="dark"] .topbar-title p,
html[data-theme="dark"] h1,
html[data-theme="dark"] h2,
html[data-theme="dark"] h3,
html[data-theme="dark"] h4,
html[data-theme="dark"] label,
html[data-theme="dark"] summary,
html[data-theme="dark"] .list-item-main strong,
html[data-theme="dark"] .animal-card h3,
html[data-theme="dark"] .pedigree-intro-card strong,
html[data-theme="dark"] .review-summary-card strong,
html[data-theme="dark"] .file-drop strong { color: #F3EFE5; }
html[data-theme="dark"] .muted,
html[data-theme="dark"] .page-header p,
html[data-theme="dark"] .list-item-main span,
html[data-theme="dark"] .animal-card .meta,
html[data-theme="dark"] .panel-header small,
html[data-theme="dark"] .pedigree-intro-card span,
html[data-theme="dark"] .wizard-heading p,
html[data-theme="dark"] .file-drop,
html[data-theme="dark"] .review-summary-card small,
html[data-theme="dark"] .text-button { color: #AAB8C3; }
html[data-theme="dark"] .stat-card,
html[data-theme="dark"] .panel,
html[data-theme="dark"] .animal-card,
html[data-theme="dark"] .settings-card,
html[data-theme="dark"] .list-item,
html[data-theme="dark"] .onboarding-card,
html[data-theme="dark"] .modal,
html[data-theme="dark"] .detail-field,
html[data-theme="dark"] .pedigree-cell,
html[data-theme="dark"] .pedigree-intro-card,
html[data-theme="dark"] .review-summary-card,
html[data-theme="dark"] .ancestor-card,
html[data-theme="dark"] .file-drop,
html[data-theme="dark"] .pedigree-step-button { background: #102A41; border-color: rgba(208,225,235,.12); }
html[data-theme="dark"] .ancestor-card.linked { background: #18352D; }
html[data-theme="dark"] input,
html[data-theme="dark"] select,
html[data-theme="dark"] textarea { color: #EEF3F6; background: #0A2033; border-color: rgba(208,225,235,.18); color-scheme: dark; }
html[data-theme="dark"] .button-ghost,
html[data-theme="dark"] .icon-button,
html[data-theme="dark"] .profile-button { color: #EEF3F6; background: #102A41; border-color: rgba(208,225,235,.15); }
html[data-theme="dark"] .data-table th,
html[data-theme="dark"] .data-table td { border-color: rgba(208,225,235,.1); }
html[data-theme="dark"] .data-table tbody tr:hover { background: rgba(255,255,255,.035); }
html[data-theme="dark"] .wizard-footer { background: rgba(7,24,39,.96); border-color: rgba(208,225,235,.12); }
html[data-theme="dark"] .pedigree-warning { color: #E7D2A5; background: #332B1D; border-color: rgba(231,210,165,.2); }
html[data-theme="dark"] .empty-state { color: #AAB8C3; background: rgba(16,42,65,.55); border-color: rgba(208,225,235,.18); }
html[data-theme="dark"] .badge { color: #D8EEEC; background: #18433F; }
html[data-theme="dark"] .badge.green { color: #DCEADB; background: #24452E; }
html[data-theme="dark"] .badge.gray { color: #D2DBE0; background: #263A49; }
html[data-theme="dark"] .pedigree-source-preview { background: #0A2033; border-color: rgba(208,225,235,.12); }

@media (max-width: 1000px) {
  .pedigree-stepper { grid-template-columns: 1fr; }
  .pedigree-step-button { min-height: 44px; }
  .pedigree-intro { grid-template-columns: 1fr; }
  .review-summary-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
}

@media (max-width: 860px) {
  body.sidebar-collapsed { --sidebar-width: 260px; }
  body.sidebar-collapsed .sidebar { width: 260px; padding-inline: 16px; }
  body.sidebar-collapsed .brand { justify-content: flex-start; padding-inline: 8px; }
  body.sidebar-collapsed .brand > div,
  body.sidebar-collapsed .nav-item span:last-child,
  body.sidebar-collapsed .nav-group-label,
  body.sidebar-collapsed .collapse-label,
  body.sidebar-collapsed .local-badge > div { display: block; }
  body.sidebar-collapsed .nav-item,
  body.sidebar-collapsed .sidebar-collapse { justify-content: flex-start; padding-inline: 12px; }
  body.sidebar-collapsed .collapse-icon { transform: none; }
  .sidebar-collapse { display: none; }
}

@media (max-width: 620px) {
  .theme-toggle { width: 40px; min-width: 40px; }
  .wizard-footer { flex-wrap: wrap; margin-inline: -18px; margin-bottom: -18px; padding: 14px 18px; }
  .wizard-spacer { display: none; }
  .wizard-footer .button { flex: 1 1 42%; }
  .review-summary-grid { grid-template-columns: 1fr; }
  .file-drop { min-height: 140px; padding: 18px; }
}

  </style>

  <script>
    // Standalone recovery build: remove any stale pre-alpha service workers/caches.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => registrations.forEach((registration) => registration.unregister()))
        .catch(() => {});
    }
    if ("caches" in window) {
      caches.keys()
        .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        .catch(() => {});
    }
  </script>

  <script>
(() => {
  "use strict";

  const STORAGE_KEY = "herdharbor_pre_alpha_v1";

  const defaultState = {
    profile: null,
    animals: [],
    breedings: [],
    litters: [],
    pedigrees: [],
    pedigreeDrafts: [],
    health: [],
    tasks: [],
    activity: [],
    settings: {
      species: ["Rabbit", "Chicken", "Duck", "Turkey", "Goat", "Sheep", "Cattle", "Pig", "Other"],
      theme: "system",
      sidebarCollapsed: false
    }
  };

  let state = loadState();
  let currentRoute = "dashboard";

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
  const uid = (prefix = "id") => `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
  const todayISO = () => new Date().toISOString().slice(0, 10);
  const addDays = (dateString, days) => {
    const d = new Date(`${dateString}T12:00:00`);
    d.setDate(d.getDate() + Number(days));
    return d.toISOString().slice(0, 10);
  };
  const esc = (value = "") =>
    String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    })[char]);

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultState);
      const parsed = JSON.parse(raw);
      return {
        ...structuredClone(defaultState),
        ...parsed,
        pedigreeDrafts: Array.isArray(parsed.pedigreeDrafts) ? parsed.pedigreeDrafts : [],
        settings: { ...defaultState.settings, ...(parsed.settings || {}) }
      };
    } catch {
      return structuredClone(defaultState);
    }
  }

  function saveState(message = "") {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (message) toast(message, "success");
      return true;
    } catch (error) {
      toast("This device does not have enough browser storage. Export a backup and remove large pedigree documents.", "error");
      return false;
    }
  }

  function toast(message, type = "") {
    const region = $("#toast-region");
    const node = document.createElement("div");
    node.className = `toast ${type}`;
    node.textContent = message;
    region.appendChild(node);
    setTimeout(() => node.remove(), 3200);
  }

  function formatDate(dateString) {
    if (!dateString) return "—";
    const date = new Date(`${dateString}T12:00:00`);
    return new Intl.DateTimeFormat("en-US", {
      month: "short", day: "numeric", year: "numeric"
    }).format(date);
  }

  function daysFromNow(dateString) {
    if (!dateString) return null;
    const today = new Date(`${todayISO()}T12:00:00`);
    const target = new Date(`${dateString}T12:00:00`);
    return Math.round((target - today) / 86400000);
  }

  function animalName(id) {
    return state.animals.find((a) => a.id === id)?.name || "Unknown";
  }

  function speciesIcon(species = "") {
    const icons = {
      Rabbit: "🐇", Chicken: "🐔", Duck: "🦆", Turkey: "🦃",
      Goat: "🐐", Sheep: "🐑", Cattle: "🐄", Pig: "🐖", Other: "◈"
    };
    return icons[species] || "◈";
  }

  function ageText(dob) {
    if (!dob) return "Age unknown";
    const diff = Math.max(0, Math.floor((new Date() - new Date(`${dob}T12:00:00`)) / 86400000));
    if (diff < 60) return `${diff} days`;
    if (diff < 730) return `${Math.floor(diff / 30.44)} months`;
    const years = Math.floor(diff / 365.25);
    return `${years} year${years === 1 ? "" : "s"}`;
  }

  function recordActivity(text, type = "record") {
    state.activity.unshift({
      id: uid("activity"),
      text,
      type,
      date: new Date().toISOString()
    });
    state.activity = state.activity.slice(0, 30);
  }


  function resolvedTheme(mode = state.settings?.theme || "system") {
    if (mode === "system") {
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    return mode === "dark" ? "dark" : "light";
  }

  function applyTheme(mode = "system", persist = true) {
    state.settings = { ...defaultState.settings, ...(state.settings || {}), theme: mode };
    const resolved = resolvedTheme(mode);
    document.documentElement.dataset.theme = resolved;
    localStorage.setItem("herdharbor_theme", mode);
    const button = $("#theme-toggle");
    if (button) {
      button.textContent = resolved === "dark" ? "☀" : "☾";
      button.title = resolved === "dark" ? "Switch to light mode" : "Switch to dark mode";
      button.setAttribute("aria-label", button.title);
    }
    if (persist) saveState();
  }

  function toggleTheme() {
    applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
  }

  function applySidebarState(persist = false) {
    const collapsed = Boolean(state.settings?.sidebarCollapsed);
    document.body.classList.toggle("sidebar-collapsed", collapsed);
    const button = $("#sidebar-collapse");
    if (button) {
      button.title = collapsed ? "Expand navigation" : "Collapse navigation";
      button.setAttribute("aria-label", button.title);
    }
    if (persist) saveState();
  }

  function toggleSidebarCollapse() {
    state.settings.sidebarCollapsed = !state.settings.sidebarCollapsed;
    applySidebarState(true);
  }

  function initialize() {
    state.settings = { ...defaultState.settings, ...(state.settings || {}) };
    state.pedigreeDrafts = Array.isArray(state.pedigreeDrafts) ? state.pedigreeDrafts : [];
    applyTheme(state.settings.theme || localStorage.getItem("herdharbor_theme") || "system", false);
    applySidebarState(false);

    $("#onboarding-form").addEventListener("submit", handleOnboarding);
    $("#menu-button").addEventListener("click", () => $("#sidebar").classList.toggle("open"));
    $("#modal-close").addEventListener("click", closeModal);
    $("#modal-backdrop").addEventListener("click", (event) => {
      if (event.target.id === "modal-backdrop") closeModal();
    });
    $("#theme-toggle").addEventListener("click", toggleTheme);
    $("#sidebar-collapse").addEventListener("click", toggleSidebarCollapse);
    $("#feedback-button").addEventListener("click", openFeedbackForm);
    $("#quick-add-button").addEventListener("click", openQuickAdd);
    $("#profile-button").addEventListener("click", () => navigate("settings"));

    $$(".nav-item, .brand").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        navigate(item.dataset.route);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => {
      if (state.settings.theme === "system") applyTheme("system", false);
    });

    if (state.profile) showApp();
    else showOnboarding();

    // This standalone tester build intentionally does not register an external service worker.
  }

  function showOnboarding() {
    $("#onboarding").classList.remove("hidden");
    $("#app-shell").classList.add("hidden");
  }

  function showApp() {
    $("#onboarding").classList.add("hidden");
    $("#app-shell").classList.remove("hidden");
    $("#operation-name").textContent = state.profile.operationName;
    $("#profile-initials").textContent = initials(state.profile.ownerName);
    navigate(currentRoute);
  }

  function initials(name = "") {
    return name.trim().split(/\s+/).slice(0, 2).map((part) => part[0]?.toUpperCase()).join("") || "HH";
  }

  function handleOnboarding(event) {
    event.preventDefault();
    const data = new FormData(event.currentTarget);
    state.profile = {
      operationName: data.get("operationName").trim(),
      ownerName: data.get("ownerName").trim(),
      email: data.get("email").trim(),
      createdAt: new Date().toISOString()
    };
    recordActivity("Created the HerdHarbor pre-alpha workspace.", "setup");
    saveState();
    showApp();
  }

  function navigate(route) {
    currentRoute = route || "dashboard";
    $$(".view").forEach((view) => view.classList.remove("active"));
    $$(".nav-item").forEach((item) => item.classList.toggle("active", item.dataset.route === currentRoute));
    const target = $(`#view-${currentRoute}`);
    if (target) target.classList.add("active");
    $("#page-subtitle").textContent = routeTitle(currentRoute);
    $("#sidebar").classList.remove("open");
    renderCurrentView();
    location.hash = currentRoute;
  }

  function routeTitle(route) {
    return ({
      dashboard: "Overview",
      animals: "Animal records",
      breeding: "Breeding records",
      litters: "Litter records",
      pedigrees: "Pedigree imports",
      health: "Health and weights",
      tasks: "Tasks and reminders",
      settings: "Workspace settings"
    })[route] || "Overview";
  }

  function renderCurrentView() {
    const renderers = {
      dashboard: renderDashboard,
      animals: renderAnimals,
      breeding: renderBreedings,
      litters: renderLitters,
      pedigrees: renderPedigrees,
      health: renderHealth,
      tasks: renderTasks,
      settings: renderSettings
    };
    renderers[currentRoute]?.();
  }

  function headerHtml(title, description, actions = "") {
    return `
      <div class="page-header">
        <div>
          <p class="eyebrow">HerdHarbor pre-alpha</p>
          <h2>${esc(title)}</h2>
          <p>${esc(description)}</p>
        </div>
        <div class="header-actions">${actions}</div>
      </div>`;
  }

  function renderDashboard() {
    const activeAnimals = state.animals.filter((a) => !["Sold", "Deceased", "Ancestor Only"].includes(a.status)).length;
    const openBreedings = state.breedings.filter((b) => !["Completed", "Cancelled"].includes(b.status)).length;
    const openTasks = state.tasks.filter((t) => !t.completed).length;
    const dueSoon = state.breedings.filter((b) => {
      const d = daysFromNow(b.dueDate);
      return !["Completed", "Cancelled"].includes(b.status) && d !== null && d >= 0 && d <= 14;
    }).length;

    const upcoming = [
      ...state.tasks.filter((t) => !t.completed).map((t) => ({
        title: t.title,
        subtitle: `${t.category || "Task"} · ${formatDate(t.dueDate)}`,
        date: t.dueDate,
        icon: "✓",
        tone: daysFromNow(t.dueDate) < 0 ? "warning" : "teal"
      })),
      ...state.breedings.filter((b) => !["Completed", "Cancelled"].includes(b.status)).map((b) => ({
        title: `${animalName(b.femaleId)} × ${animalName(b.maleId)}`,
        subtitle: `Due ${formatDate(b.dueDate)}`,
        date: b.dueDate,
        icon: "♡",
        tone: "green"
      }))
    ].sort((a, b) => (a.date || "9999").localeCompare(b.date || "9999")).slice(0, 6);

    const activity = state.activity.slice(0, 6);

    $("#view-dashboard").innerHTML = `
      ${headerHtml(
        `Good ${greeting()}, ${state.profile.ownerName.split(" ")[0]}.`,
        "Here is the current picture of your operation.",
        `<button class="button button-primary" data-action="add-animal">+ Add animal</button>`
      )}
      <div class="stats-grid">
        ${statCard("Animals", activeAnimals, `${state.animals.length} total records`)}
        ${statCard("Active breedings", openBreedings, `${dueSoon} due within 14 days`)}
        ${statCard("Open tasks", openTasks, `${state.tasks.filter((t) => !t.completed && daysFromNow(t.dueDate) < 0).length} overdue`)}
        ${statCard("Litters", state.litters.length, `${state.litters.reduce((sum, l) => sum + Number(l.bornAlive || 0), 0)} live births recorded`)}
      </div>
      <div class="dashboard-grid">
        <div class="panel">
          <div class="panel-header">
            <h3>Upcoming</h3>
            <small>Tasks and breeding dates</small>
          </div>
          ${upcoming.length ? `<div class="list">${upcoming.map((item) => listItemHtml(item)).join("")}</div>` : emptyState("Nothing is due yet.", "Add a breeding record or task to see upcoming dates.")}
        </div>
        <div class="panel">
          <div class="panel-header">
            <h3>Recent activity</h3>
            <small>Last ${activity.length}</small>
          </div>
          ${activity.length ? `<div class="list">${activity.map((item) => `
            <div class="list-item">
              <div class="list-icon navy">•</div>
              <div class="list-item-main">
                <strong>${esc(item.text)}</strong>
                <span>${new Date(item.date).toLocaleString()}</span>
              </div>
            </div>`).join("")}</div>` : emptyState("No activity yet.", "Your recent changes will appear here.")}
        </div>
      </div>`;

    $('[data-action="add-animal"]', $("#view-dashboard"))?.addEventListener("click", () => openAnimalForm());
  }

  function greeting() {
    const hour = new Date().getHours();
    if (hour < 12) return "morning";
    if (hour < 18) return "afternoon";
    return "evening";
  }

  function statCard(label, value, note) {
    return `<article class="stat-card">
      <span class="label">${esc(label)}</span>
      <strong class="value">${esc(value)}</strong>
      <span class="note">${esc(note)}</span>
    </article>`;
  }

  function listItemHtml(item) {
    return `<div class="list-item">
      <div class="list-icon ${item.tone === "green" ? "green" : item.tone === "warning" ? "warning" : ""}">${item.icon}</div>
      <div class="list-item-main">
        <strong>${esc(item.title)}</strong>
        <span>${esc(item.subtitle)}</span>
      </div>
    </div>`;
  }

  function emptyState(title, text) {
    return `<div class="empty-state"><strong>${esc(title)}</strong><p>${esc(text)}</p></div>`;
  }

  function renderAnimals() {
    $("#view-animals").innerHTML = `
      ${headerHtml(
        "Animals",
        "Keep identity, lineage, location, status, and notes connected to each animal.",
        `<button class="button button-ghost" id="import-pedigree-from-animals">Import pedigree</button>
         <button class="button button-primary" id="add-animal">+ Add animal</button>`
      )}
      <div class="toolbar">
        <input id="animal-search" type="search" placeholder="Search name, tag, registration, breeder, breed, or location">
        <select id="animal-species"><option value="">All species</option>${state.settings.species.map((s) => `<option>${esc(s)}</option>`).join("")}</select>
        <select id="animal-sex"><option value="">Any sex</option><option>Female</option><option>Male</option><option>Unknown</option></select>
        <select id="animal-status"><option value="">Any status</option><option>Active</option><option>For Sale</option><option>Sold</option><option>Deceased</option><option>Ancestor Only</option></select>
      </div>
      <div id="animal-results"></div>`;

    $("#add-animal").addEventListener("click", () => openAnimalForm());
    $("#import-pedigree-from-animals").addEventListener("click", () => openPedigreeImport());
    ["animal-search", "animal-species", "animal-sex", "animal-status"].forEach((id) => {
      $(`#${id}`).addEventListener("input", renderAnimalResults);
      $(`#${id}`).addEventListener("change", renderAnimalResults);
    });
    renderAnimalResults();
  }

  function renderAnimalResults() {
    const root = $("#animal-results");
    if (!root) return;
    const query = ($("#animal-search")?.value || "").toLowerCase();
    const species = $("#animal-species")?.value || "";
    const sex = $("#animal-sex")?.value || "";
    const status = $("#animal-status")?.value || "";

    const animals = state.animals.filter((a) => {
      const haystack = [a.name, a.tag, a.registrationNumber, a.tattoo, a.breeder, a.breed, a.location, a.color].join(" ").toLowerCase();
      return (!query || haystack.includes(query)) &&
        (!species || a.species === species) &&
        (!sex || a.sex === sex) &&
        (!status || a.status === status);
    });

    root.innerHTML = animals.length ? `<div class="cards-grid">${animals.map(animalCardHtml).join("")}</div>` :
      emptyState("No matching animals.", "Add a new animal or change the filters.");

    $$("[data-view-animal]", root).forEach((button) => button.addEventListener("click", () => openAnimalDetail(button.dataset.viewAnimal)));
    $$("[data-edit-animal]", root).forEach((button) => button.addEventListener("click", () => openAnimalForm(button.dataset.editAnimal)));
  }

  function animalCardHtml(a) {
    return `<article class="animal-card">
      <div class="animal-card-top">
        <div class="animal-avatar">${speciesIcon(a.species)}</div>
        <span class="badge ${a.status === "Active" ? "green" : a.status === "For Sale" ? "warning" : "gray"}">${esc(a.status || "Active")}</span>
      </div>
      <h3>${esc(a.name || "Unnamed animal")}</h3>
      <div class="meta">${esc([a.tag, a.breed, a.sex].filter(Boolean).join(" · "))}</div>
      <div class="meta">${esc(ageText(a.dob))}${a.location ? ` · ${esc(a.location)}` : ""}</div>
      <div class="animal-card-footer">
        <button class="button button-ghost button-small" data-view-animal="${a.id}">View</button>
        <button class="button button-ghost button-small" data-edit-animal="${a.id}">Edit</button>
      </div>
    </article>`;
  }

  function openAnimalForm(id = "") {
    const animal = state.animals.find((a) => a.id === id) || {};
    openModal(id ? "Edit animal" : "Add animal", `
      <form id="animal-form">
        <div class="form-grid two">
          ${field("Name", "name", animal.name, true)}
          ${field("ID or tag", "tag", animal.tag)}
          ${field("Tattoo / ear number", "tattoo", animal.tattoo)}
          ${field("Registration number", "registrationNumber", animal.registrationNumber)}
          ${field("Breeder name", "breeder", animal.breeder)}
          ${selectField("Species", "species", state.settings.species, animal.species || "Rabbit", true)}
          ${field("Breed", "breed", animal.breed)}
          ${selectField("Sex", "sex", ["Female", "Male", "Unknown"], animal.sex || "Unknown", true)}
          ${field("Date of birth", "dob", animal.dob, false, "date")}
          ${field("Color or variety", "color", animal.color)}
          ${field("Location / cage / pen", "location", animal.location)}
          ${selectField("Status", "status", ["Active", "For Sale", "Sold", "Deceased", "Ancestor Only"], animal.status || "Active", true)}
          ${selectAnimalField("Sire", "sireId", animal.sireId, "Male")}
          ${selectAnimalField("Dam", "damId", animal.damId, "Female")}
        </div>
        ${textareaField("Notes", "notes", animal.notes)}
        <div class="modal-actions">
          ${id ? `<button type="button" class="button button-danger" id="delete-animal">Delete</button>` : ""}
          <button type="button" class="button button-ghost" id="cancel-modal">Cancel</button>
          <button type="submit" class="button button-primary">${id ? "Save changes" : "Add animal"}</button>
        </div>
      </form>
    `, "Animal record");

    $("#cancel-modal").addEventListener("click", closeModal);
    $("#animal-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.currentTarget));
      if (id) {
        Object.assign(animal, data, { updatedAt: new Date().toISOString() });
        recordActivity(`Updated ${data.name}.`, "animal");
      } else {
        state.animals.push({ id: uid("animal"), ...data, createdAt: new Date().toISOString() });
        recordActivity(`Added ${data.name} to animal records.`, "animal");
      }
      saveState(id ? "Animal updated." : "Animal added.");
      closeModal();
      renderCurrentView();
    });

    $("#delete-animal")?.addEventListener("click", () => {
      if (!confirm(`Delete ${animal.name}? This cannot be undone.`)) return;
      state.animals = state.animals.filter((a) => a.id !== id);
      state.breedings = state.breedings.filter((b) => b.femaleId !== id && b.maleId !== id);
      state.health = state.health.filter((h) => h.animalId !== id);
      state.pedigrees = state.pedigrees.filter((p) => p.subjectAnimalId !== id);
      state.pedigreeDrafts = state.pedigreeDrafts.filter((p) => p.subjectAnimalId !== id);
      state.tasks = state.tasks.map((t) => t.animalId === id ? { ...t, animalId: "" } : t);
      recordActivity(`Deleted ${animal.name}.`, "animal");
      saveState("Animal deleted.");
      closeModal();
      renderCurrentView();
    });
  }

  function openAnimalDetail(id) {
    const a = state.animals.find((item) => item.id === id);
    if (!a) return;
    const sire = state.animals.find((x) => x.id === a.sireId);
    const dam = state.animals.find((x) => x.id === a.damId);
    const sireSire = sire ? state.animals.find((x) => x.id === sire.sireId) : null;
    const sireDam = sire ? state.animals.find((x) => x.id === sire.damId) : null;
    const damSire = dam ? state.animals.find((x) => x.id === dam.sireId) : null;
    const damDam = dam ? state.animals.find((x) => x.id === dam.damId) : null;
    const health = state.health.filter((h) => h.animalId === id).sort((x,y) => (y.date || "").localeCompare(x.date || ""));
    const breedings = state.breedings.filter((b) => b.femaleId === id || b.maleId === id);
    const pedigreeImports = state.pedigrees.filter((p) => p.subjectAnimalId === id);

    openModal(a.name, `
      <div class="detail-grid">
        ${detailField("Species", a.species)}
        ${detailField("Breed", a.breed)}
        ${detailField("Sex", a.sex)}
        ${detailField("Tag", a.tag)}
        ${detailField("Tattoo / ear number", a.tattoo)}
        ${detailField("Registration", a.registrationNumber)}
        ${detailField("Breeder", a.breeder)}
        ${detailField("Born", formatDate(a.dob))}
        ${detailField("Age", ageText(a.dob))}
        ${detailField("Location", a.location)}
        ${detailField("Status", a.status)}
      </div>
      <h3 style="margin-top:22px">Pedigree preview</h3>
      <div class="pedigree-grid">
        <div class="pedigree-cell"><div><strong>${esc(a.name)}</strong><small>Animal</small></div></div>
        <div>
          <div class="pedigree-cell"><div><strong>${esc(sire?.name || "Unknown sire")}</strong><small>Sire</small></div></div>
          <div class="pedigree-cell" style="margin-top:10px"><div><strong>${esc(dam?.name || "Unknown dam")}</strong><small>Dam</small></div></div>
        </div>
        <div>
          ${[sireSire, sireDam, damSire, damDam].map((x, i) => `<div class="pedigree-cell" style="${i ? "margin-top:6px" : ""}"><div><strong>${esc(x?.name || "Unknown")}</strong><small>${["Sire's sire","Sire's dam","Dam's sire","Dam's dam"][i]}</small></div></div>`).join("")}
        </div>
      </div>
      <h3 style="margin-top:22px">Notes</h3>
      <p class="muted">${esc(a.notes || "No notes recorded.")}</p>
      <h3 style="margin-top:22px">Record summary</h3>
      <p class="muted">${health.length} health record${health.length === 1 ? "" : "s"} · ${breedings.length} breeding record${breedings.length === 1 ? "" : "s"} · ${pedigreeImports.length} pedigree import${pedigreeImports.length === 1 ? "" : "s"}</p>
      <div class="modal-actions">
        <button class="button button-ghost" id="detail-close">Close</button>
        <button class="button button-ghost" id="detail-print-pedigree">Print sale pedigree</button>
        <button class="button button-ghost" id="detail-import-pedigree">Build / import pedigree</button>
        <button class="button button-primary" id="detail-edit">Edit animal</button>
      </div>
    `, `${a.species || "Animal"} record`);

    $("#detail-close").addEventListener("click", closeModal);
    $("#detail-print-pedigree").addEventListener("click", () => openPrintPedigreeForm(id));
    $("#detail-import-pedigree").addEventListener("click", () => openPedigreeImport(id));
    $("#detail-edit").addEventListener("click", () => openAnimalForm(id));
  }

  function detailField(label, value) {
    return `<div class="detail-field"><small>${esc(label)}</small><strong>${esc(value || "—")}</strong></div>`;
  }

  function renderBreedings() {
    const rows = state.breedings.slice().sort((a,b) => (b.breedingDate || "").localeCompare(a.breedingDate || ""));
    $("#view-breeding").innerHTML = `
      ${headerHtml(
        "Breeding",
        "Track pairings, expected dates, nest-box timing, and outcomes.",
        `<button class="button button-primary" id="add-breeding">+ Add breeding</button>`
      )}
      ${rows.length ? `<div class="panel data-table-wrap">
        <table class="data-table">
          <thead><tr><th>Pairing</th><th>Bred</th><th>Nest box</th><th>Due</th><th>Status</th><th></th></tr></thead>
          <tbody>${rows.map((b) => `
            <tr>
              <td><strong>${esc(animalName(b.femaleId))}</strong> × ${esc(animalName(b.maleId))}</td>
              <td>${formatDate(b.breedingDate)}</td>
              <td>${formatDate(b.nestBoxDate)}</td>
              <td>${formatDate(b.dueDate)}</td>
              <td><span class="badge ${b.status === "Completed" ? "gray" : "green"}">${esc(b.status)}</span></td>
              <td><button class="button button-ghost button-small" data-edit-breeding="${b.id}">Edit</button></td>
            </tr>`).join("")}</tbody>
        </table>
      </div>` : emptyState("No breeding records yet.", "Add a pairing to calculate due and nest-box dates.")}`;

    $("#add-breeding").addEventListener("click", () => openBreedingForm());
    $$("[data-edit-breeding]", $("#view-breeding")).forEach((button) =>
      button.addEventListener("click", () => openBreedingForm(button.dataset.editBreeding)));
  }

  function openBreedingForm(id = "") {
    if (!state.animals.length) {
      toast("Add animals before creating a breeding record.", "error");
      navigate("animals");
      return;
    }
    const breeding = state.breedings.find((b) => b.id === id) || {};
    openModal(id ? "Edit breeding" : "Add breeding", `
      <form id="breeding-form">
        <div class="form-grid two">
          ${selectAnimalField("Female / dam", "femaleId", breeding.femaleId, "Female", true)}
          ${selectAnimalField("Male / sire", "maleId", breeding.maleId, "Male", true)}
          ${field("Breeding date", "breedingDate", breeding.breedingDate || todayISO(), true, "date")}
          ${field("Nest-box date", "nestBoxDate", breeding.nestBoxDate || "", false, "date")}
          ${field("Expected due date", "dueDate", breeding.dueDate || "", true, "date")}
          ${selectField("Status", "status", ["Bred", "Confirmed", "Due Soon", "Completed", "Cancelled"], breeding.status || "Bred", true)}
        </div>
        ${textareaField("Notes", "notes", breeding.notes)}
        <div class="modal-actions">
          ${id ? `<button type="button" class="button button-danger" id="delete-breeding">Delete</button>` : ""}
          <button type="button" class="button button-ghost" id="cancel-modal">Cancel</button>
          <button type="submit" class="button button-primary">${id ? "Save changes" : "Add breeding"}</button>
        </div>
      </form>`, "Breeding record");

    const breedingDateInput = $('[name="breedingDate"]');
    const dueDateInput = $('[name="dueDate"]');
    const nestInput = $('[name="nestBoxDate"]');
    const femaleInput = $('[name="femaleId"]');

    const calculateRabbitDates = () => {
      const female = state.animals.find((a) => a.id === femaleInput.value);
      if (female?.species === "Rabbit" && breedingDateInput.value) {
        if (!dueDateInput.value) dueDateInput.value = addDays(breedingDateInput.value, 31);

  function ancestorCardHtml(slot, initial = {}) {

          ${field("Breed", `${slot.key}_breed`, manual.breed || "")}

    </article>`;

  function openPedigreeImport(subjectAnimalId = "", draftId = "") {
    if (!state.animals.some((animal) => animal.status !== "Ancestor Only")) {
      toast("Add the animal receiving the pedigree before building it.", "error");
      navigate("animals");
      return;
    }

    const storedDraft = (state.pedigreeDrafts || []).find((draft) => draft.id === draftId) || null;
    const initial = storedDraft?.data || {};
    let sourceDocument = storedDraft?.sourceDocument || null;
    let currentStep = Math.min(5, Math.max(1, Number(storedDraft?.step || 1)));
    const selectedSubjectId = subjectAnimalId || initial.subjectAnimalId || "";

    const subjectOptions = state.animals
      .filter((animal) => animal.status !== "Ancestor Only")
      .sort((a,b) => (a.name || "").localeCompare(b.name || ""))
      .map((animal) => `<option value="${animal.id}" ${animal.id === selectedSubjectId ? "selected" : ""}>${esc(animal.name)}${animal.tag ? ` · ${esc(animal.tag)}` : ""}</option>`)
      .join("");

    const slotsFor = (generation) => PEDIGREE_SLOTS
      .filter((slot) => slot.generation === generation)
      .map((slot) => ancestorCardHtml(slot, initial.ancestors?.[slot.key] || {}))
      .join("");

    openModal(storedDraft ? "Resume pedigree draft" : "Build or import pedigree", `
      <form id="pedigree-import-form">
        <div class="pedigree-stepper" aria-label="Pedigree builder steps">

        </div>

        <section class="wizard-panel" data-pedigree-step="1">
          <div class="wizard-heading"><h3>Choose the animal and source</h3><p>Start with the animal receiving this pedigree. A source photo or PDF is optional.</p></div>
          <div class="pedigree-warning">Images larger than the browser limit are compressed automatically. PDF files must be 1.25 MB or smaller in this pre-alpha.</div>
          <div class="form-grid two">
            <label>Animal receiving this pedigree
              <select name="subjectAnimalId" id="pedigree-subject" required>
                <option value="">Choose an animal</option>
                ${subjectOptions}
              </select>
            </label>
            ${field("Source or breeder notes", "sourceNotes", initial.sourceNotes || "")}
          </div>
          <div class="form-grid two" id="pedigree-subject-details">
            ${field("Tattoo / ear number", "subjectTattoo", initial.subjectTattoo || "")}
            ${field("Registration number", "subjectRegistrationNumber", initial.subjectRegistrationNumber || "")}
            ${field("Breeder name", "subjectBreeder", initial.subjectBreeder || "")}
            ${field("Color / variety", "subjectColor", initial.subjectColor || "")}
          </div>
          <div class="pedigree-source-box">
            <input id="pedigree-file" class="hidden" type="file" accept="image/jpeg,image/png,application/pdf">
            <div id="pedigree-drop" class="file-drop" role="button" tabindex="0">
              <div>
                <strong>Drop a pedigree here or choose a file</strong>
                <small>JPG, PNG, or PDF. Large photos will be resized for easier upload.</small>
                <div class="file-actions"><span class="button button-ghost button-small">Choose file</span></div>
              </div>
            </div>
            <div id="pedigree-source-preview" class="pedigree-source-preview" style="margin-top:12px"></div>
          </div>
        </section>

        <section class="wizard-panel" data-pedigree-step="2" hidden>
          <div class="wizard-heading"><h3>Add the parents</h3><p>Select an existing animal, enter a new ancestor, or leave the position unknown.</p></div>
          <div class="ancestor-grid">${slotsFor("Parents")}</div>
        </section>

        <section class="wizard-panel" data-pedigree-step="3" hidden>
          <div class="wizard-heading"><h3>Add the grandparents</h3><p>Work through the sire side and dam side without seeing the entire pedigree at once.</p></div>
          <div class="ancestor-grid">${slotsFor("Grandparents")}</div>
        </section>

        <section class="wizard-panel" data-pedigree-step="4" hidden>
          <div class="wizard-heading"><h3>Add the great-grandparents</h3><p>Unknown ancestors may be left blank. You can save this pedigree as a draft at any time.</p></div>
          <div class="ancestor-grid">${slotsFor("Great-grandparents")}</div>
        </section>

        <section class="wizard-panel" data-pedigree-step="5" hidden>
          <div class="wizard-heading"><h3>Review and confirm</h3><p>Check what will be linked or created before saving the pedigree.</p></div>
          <div id="pedigree-review"></div>
          ${textareaField("Pedigree notes", "notes", initial.notes || "")}
        </section>

        <div class="wizard-footer">
          <button type="button" class="button button-ghost" id="cancel-pedigree-import">Cancel</button>
          <button type="button" class="button button-ghost" id="save-pedigree-draft">Save draft & exit</button>
          <span class="wizard-spacer"></span>
          <button type="button" class="button button-ghost" id="pedigree-previous">Previous</button>
          <button type="button" class="button button-primary" id="pedigree-next">Next</button>
          <button type="submit" class="button button-primary hidden" id="pedigree-confirm">Confirm & save pedigree</button>
        </div>
      </form>`, "Guided pedigree builder · v0.2.1");

    $(".modal").classList.add("modal-wide");
    const form = $("#pedigree-import-form");
    const subjectSelect = $("#pedigree-subject");
    const fileInput = $("#pedigree-file");
    const dropZone = $("#pedigree-drop");
    const preview = $("#pedigree-source-preview");

    const populateSubjectDetails = (force = false) => {
      const subject = state.animals.find((a) => a.id === subjectSelect.value);
      if (!subject) return;
      const values = {
        subjectTattoo: subject.tattoo || "",
        subjectRegistrationNumber: subject.registrationNumber || "",
        subjectBreeder: subject.breeder || "",
        subjectColor: subject.color || ""
      };
      Object.entries(values).forEach(([name, value]) => {
        const input = form.elements[name];
        if (input && (force || !input.value)) input.value = value;
      });
    };
    subjectSelect.addEventListener("change", () => populateSubjectDetails(true));
    populateSubjectDetails(false);

    const renderSource = () => {
      if (!sourceDocument?.dataUrl) {
        preview.innerHTML = `<p class="muted" style="margin:0">No document attached. You can build the pedigree manually.</p>`;
        return;
      }
      preview.innerHTML = `
        <div class="panel-header"><div><strong>${esc(sourceDocument.fileName)}</strong><small>${formatFileSize(sourceDocument.size)}</small></div><button type="button" class="button button-danger button-small" id="remove-pedigree-source">Remove</button></div>
        ${sourceDocument.mimeType === "application/pdf"
          ? `<object data="${sourceDocument.dataUrl}" type="application/pdf"><a href="${sourceDocument.dataUrl}" download="${esc(sourceDocument.fileName)}">Open PDF</a></object>`
          : `<img src="${sourceDocument.dataUrl}" alt="Uploaded pedigree preview">`}`;
      $("#remove-pedigree-source")?.addEventListener("click", () => {
        sourceDocument = null;
        fileInput.value = "";
        renderSource();
      });
    };
    renderSource();

    const handleFile = async (file) => {
      if (!file) return;
      dropZone.classList.add("busy");
      dropZone.querySelector("strong").textContent = "Preparing pedigree document…";
      try {
        sourceDocument = await preparePedigreeDocument(file);
        renderSource();
        toast(sourceDocument.compressed ? "Large photo compressed and attached." : "Pedigree source attached.", "success");
      } catch (error) {
        toast(error.message || "The pedigree document could not be prepared.", "error");
      } finally {
        dropZone.classList.remove("busy", "dragging");
        dropZone.querySelector("strong").textContent = "Drop a pedigree here or choose a file";
      }
    };

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fileInput.click();
      }
    });
    ["dragenter", "dragover"].forEach((name) => dropZone.addEventListener(name, (event) => {
      event.preventDefault();
      dropZone.classList.add("dragging");
    }));
    ["dragleave", "drop"].forEach((name) => dropZone.addEventListener(name, (event) => {
      event.preventDefault();
      dropZone.classList.remove("dragging");
    }));
    dropZone.addEventListener("drop", (event) => handleFile(event.dataTransfer?.files?.[0]));
    fileInput.addEventListener("change", (event) => handleFile(event.target.files?.[0]));

    PEDIGREE_SLOTS.forEach((slot) => {
      const card = $(`[data-ancestor-card="${slot.key}"]`);
      const existingSelect = $(`[data-existing-select="${slot.key}"]`);
      const manualDetails = $(".ancestor-manual", card);
      const manualInputs = $$(`input[name^="${slot.key}_"]`, card);
      const updateCardMode = () => {
        const linked = Boolean(existingSelect.value);
        card.classList.toggle("linked", linked);
        if (linked) {
          const animal = state.animals.find((a) => a.id === existingSelect.value);
          manualDetails.open = false;
          $(`[data-match-hint="${slot.key}"]`).textContent = animal ? `Using existing record: ${animal.name}` : "";
        } else {
          updateDuplicateHint(slot.key);
        }
      };
      existingSelect.addEventListener("change", updateCardMode);
      manualInputs.forEach((input) => input.addEventListener("input", () => updateDuplicateHint(slot.key)));
      $(`[data-clear-ancestor="${slot.key}"]`).addEventListener("click", () => {
        existingSelect.value = "";
        manualInputs.forEach((input) => input.value = "");
        manualDetails.open = false;
        $(`[data-match-hint="${slot.key}"]`).textContent = "";
        updateCardMode();
      });
      updateCardMode();
    });

    const validateStep = (step) => {
      if (step === 1 && !subjectSelect.value) {
        toast("Choose the animal receiving the pedigree before continuing.", "error");
        subjectSelect.focus();
        return false;
      }
      return true;
    };

    const showStep = (step) => {
      currentStep = Math.min(5, Math.max(1, Number(step)));
      $$('[data-pedigree-step]', form).forEach((panel) => panel.hidden = Number(panel.dataset.pedigreeStep) !== currentStep);
      $$('[data-wizard-step]', form).forEach((button) => {
        const buttonStep = Number(button.dataset.wizardStep);
        button.classList.toggle("active", buttonStep === currentStep);
        button.classList.toggle("complete", buttonStep < currentStep);
      });
      $("#pedigree-previous").classList.toggle("hidden", currentStep === 1);
      $("#pedigree-next").classList.toggle("hidden", currentStep === 5);
      $("#pedigree-confirm").classList.toggle("hidden", currentStep !== 5);
      if (currentStep === 5) renderPedigreeWizardReview(form, sourceDocument);
      $(".modal").scrollTo({ top: 0, behavior: "smooth" });
    };

    $$('[data-wizard-step]', form).forEach((button) => button.addEventListener("click", () => {
      const nextStep = Number(button.dataset.wizardStep);
      if (nextStep > currentStep && !validateStep(currentStep)) return;
      showStep(nextStep);
    }));
    $("#pedigree-previous").addEventListener("click", () => showStep(currentStep - 1));
    $("#pedigree-next").addEventListener("click", () => {
      if (!validateStep(currentStep)) return;
      showStep(currentStep + 1);
    });

        step: currentStep,
        data,
        sourceDocument,
        savedAt: new Date().toISOString()
      };
      const index = state.pedigreeDrafts.findIndex((item) => item.id === draft.id);
      if (index >= 0) state.pedigreeDrafts[index] = draft;
      else state.pedigreeDrafts.push(draft);

      closeModal();
      navigate("pedigrees");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = collectPedigreeFormData(form);

        draft: data.ancestors,
        sourceDocument,

  function collectPedigreeFormData(form) {
    const value = (name) => String(form.elements[name]?.value || "").trim();
    const ancestors = {};

      ancestors[slot.key] = {
        existingId: value(`${slot.key}_existingId`),
        manual: {
          name: value(`${slot.key}_name`),
          tag: value(`${slot.key}_tag`),
          registrationNumber: value(`${slot.key}_registrationNumber`),
          breed: value(`${slot.key}_breed`),
          color: value(`${slot.key}_color`),
          breeder: value(`${slot.key}_breeder`),
          sex: slot.sex
        }
      };
    });
    return {
      subjectAnimalId: value("subjectAnimalId"),
      sourceNotes: value("sourceNotes"),
      subjectTattoo: value("subjectTattoo"),
      subjectRegistrationNumber: value("subjectRegistrationNumber"),
      subjectBreeder: value("subjectBreeder"),
      subjectColor: value("subjectColor"),
      notes: value("notes"),
      ancestors
    };
  }

  function renderPedigreeWizardReview(form, sourceDocument) {
    const data = collectPedigreeFormData(form);
    const subject = state.animals.find((animal) => animal.id === data.subjectAnimalId);
    let linkCount = 0;
    let createCount = 0;
    let unknownCount = 0;
    const duplicateWarnings = [];
    const rows = PEDIGREE_SLOTS.map((slot) => {
      const entry = data.ancestors[slot.key];
      if (entry.existingId) {
        linkCount += 1;
        const animal = state.animals.find((item) => item.id === entry.existingId);
        return `<tr><td>${esc(slot.label)}</td><td><span class="badge green">Existing</span></td><td><strong>${esc(animal?.name || "Unknown")}</strong></td><td>${esc(animal?.tag || animal?.tattoo || "—")}</td></tr>`;
      }
      const manual = entry.manual;
      if (manual.name || manual.tag || manual.registrationNumber) {
        createCount += 1;
        const matches = findPedigreeMatches(manual);
        if (matches.length) duplicateWarnings.push(`${slot.label}: ${matches.map((item) => item.name).join(", ")}`);
        return `<tr><td>${esc(slot.label)}</td><td><span class="badge warning">New ancestor</span></td><td><strong>${esc(manual.name || manual.tag || manual.registrationNumber)}</strong></td><td>${esc(manual.tag || "—")}</td></tr>`;
      }
      unknownCount += 1;
      return `<tr><td>${esc(slot.label)}</td><td><span class="badge gray">Unknown</span></td><td>—</td><td>—</td></tr>`;
    }).join("");

    $("#pedigree-review").innerHTML = `
      <div class="review-summary-grid">
        <div class="review-summary-card"><small>Animal</small><strong>${esc(subject?.name || "Not selected")}</strong></div>
        <div class="review-summary-card"><small>Source</small><strong>${esc(sourceDocument?.fileName || "Manual entry")}</strong></div>
        <div class="review-summary-card"><small>Existing links</small><strong>${linkCount}</strong></div>
        <div class="review-summary-card"><small>New / unknown</small><strong>${createCount} new · ${unknownCount} unknown</strong></div>
      </div>
      ${duplicateWarnings.length ? `<div class="pedigree-warning" style="margin-top:14px"><strong>Possible duplicate records:</strong><br>${duplicateWarnings.map(esc).join("<br>")}</div>` : ""}
      <div class="data-table-wrap" style="margin-top:14px"><table class="data-table"><thead><tr><th>Position</th><th>Action</th><th>Animal</th><th>ID / tattoo</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  function deletePedigreeDraft(id) {
    const draft = state.pedigreeDrafts.find((item) => item.id === id);
    if (!draft) return;
    if (!confirm(`Delete the unfinished pedigree draft for ${animalName(draft.subjectAnimalId)}?`)) return;
    state.pedigreeDrafts = state.pedigreeDrafts.filter((item) => item.id !== id);
    saveState("Pedigree draft deleted.");
    renderPedigrees();
  }

  async function preparePedigreeDocument(file) {
    const type = file.type || "";
    const allowed = ["image/jpeg", "image/png", "application/pdf"];
    if (!allowed.includes(type)) throw new Error("Use a JPG, PNG, or PDF pedigree.");

    if (type === "application/pdf") {
      if (file.size > 1_250_000) throw new Error("PDF pedigrees must be 1.25 MB or smaller in this browser-only pre-alpha.");
      return {
        fileName: file.name,
        mimeType: type,
        size: file.size,
        dataUrl: await readFileAsDataURL(file),
        compressed: false
      };
    }

    if (file.size <= 900_000) {
      return {
        fileName: file.name,
        mimeType: type,
        size: file.size,
        dataUrl: await readFileAsDataURL(file),
        compressed: false
      };
    }

    const originalUrl = await readFileAsDataURL(file);
    const image = await loadPedigreeImage(originalUrl);
    let width = image.naturalWidth;
    let height = image.naturalHeight;
    const maxDimension = 2000;
    const scale = Math.min(1, maxDimension / Math.max(width, height));
    width = Math.max(1, Math.round(width * scale));
    height = Math.max(1, Math.round(height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const context = canvas.getContext("2d", { alpha: false });
    context.fillStyle = "#ffffff";
    context.fillRect(0, 0, width, height);
    context.drawImage(image, 0, 0, width, height);

    let quality = .88;
    let blob = await canvasToBlob(canvas, quality);
    while (blob.size > 900_000 && quality > .58) {
      quality -= .08;
      blob = await canvasToBlob(canvas, quality);
    }
    if (blob.size > 1_100_000) throw new Error("This photo is still too large after compression. Crop it closer to the pedigree and try again.");

    return {
      fileName: file.name.replace(/\.(png|jpe?g)$/i, "") + "-compressed.jpg",
      mimeType: "image/jpeg",
      size: blob.size,
      dataUrl: await readFileAsDataURL(blob),
      compressed: true
    };
  }

  function loadPedigreeImage(dataUrl) {
    return new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = () => reject(new Error("The image could not be opened."));
      image.src = dataUrl;
    });
  }

  function canvasToBlob(canvas, quality) {
    return new Promise((resolve, reject) => canvas.toBlob(
      (blob) => blob ? resolve(blob) : reject(new Error("The photo could not be compressed.")),
      "image/jpeg",
      quality
    ));
  }

  function formatFileSize(bytes = 0) {
    if (!bytes) return "0 KB";
    if (bytes < 1_000_000) return `${Math.max(1, Math.round(bytes / 1000))} KB`;
    return `${(bytes / 1_000_000).toFixed(2)} MB`;
  }

  function updateDuplicateHint(slotKey) {
    const hint = $(`[data-match-hint="${slotKey}"]`);
    const card = $(`[data-ancestor-card="${slotKey}"]`);
    if (!hint || !card) return;
    const manual = {
      name: $(`[name="${slotKey}_name"]`, card)?.value || "",
      tag: $(`[name="${slotKey}_tag"]`, card)?.value || "",
      registrationNumber: $(`[name="${slotKey}_registrationNumber"]`, card)?.value || ""
    };
    const candidates = findPedigreeMatches(manual);
    if (!candidates.length) {
      hint.textContent = "";
      return;
    }
    const candidate = candidates[0];
    hint.innerHTML = `Possible match: ${esc(candidate.name)}${candidate.tag ? ` · ${esc(candidate.tag)}` : ""}
      <button type="button" data-use-pedigree-match="${candidate.id}" data-slot="${slotKey}">Use existing</button>`;
    $(`[data-use-pedigree-match="${candidate.id}"]`, hint)?.addEventListener("click", () => {
      const select = $(`[data-existing-select="${slotKey}"]`);
      select.value = candidate.id;
      select.dispatchEvent(new Event("change"));
    });
  }

  function normalizePedigreeValue(value = "") {
    return String(value).toLowerCase().replace(/[^a-z0-9]/g, "");
  }

  function findPedigreeMatches(manual) {
    const name = normalizePedigreeValue(manual.name);
    const tag = normalizePedigreeValue(manual.tag);
    const registration = normalizePedigreeValue(manual.registrationNumber);
    if (!name && !tag && !registration) return [];
    return state.animals.filter((animal) => {
      return (name && normalizePedigreeValue(animal.name) === name) ||
        (tag && (normalizePedigreeValue(animal.tag) === tag || normalizePedigreeValue(animal.tattoo) === tag)) ||
        (registration && normalizePedigreeValue(animal.registrationNumber) === registration);
    }).slice(0, 4);
  }

  function savePedigreeImport({ fd, subject, draft, sourceDocument, draftId = "" }) {
    const backupState = structuredClone(state);
    const ancestorIds = {};
    const now = new Date().toISOString();

    try {
      PEDIGREE_SLOTS.forEach((slot) => {
        const entry = draft[slot.key];
        if (entry.existingId) {
          ancestorIds[slot.key] = entry.existingId;
          return;
        }
        const manual = entry.manual;
        if (!(manual.name || manual.tag || manual.registrationNumber)) {
          ancestorIds[slot.key] = "";
          return;
        }
        const id = uid("animal");
        state.animals.push({
          id,
          name: manual.name || manual.tag || manual.registrationNumber || slot.label,
          tag: manual.tag,
          tattoo: manual.tag,
          registrationNumber: manual.registrationNumber,
          breeder: manual.breeder,
          species: subject.species || "Rabbit",
          breed: manual.breed || subject.breed || "",
          sex: manual.sex,
          dob: "",
          color: manual.color,
          location: "",
          status: "Ancestor Only",
          isAncestorOnly: true,
          sireId: "",
          damId: "",
          notes: `Created from pedigree import for ${subject.name}.`,
          createdAt: now
        });
        ancestorIds[slot.key] = id;
      });

      Object.assign(subject, {
        tattoo: String(fd.get("subjectTattoo") || "").trim(),
        registrationNumber: String(fd.get("subjectRegistrationNumber") || "").trim(),
        breeder: String(fd.get("subjectBreeder") || "").trim(),
        color: String(fd.get("subjectColor") || "").trim(),
        updatedAt: now
      });

      const allIds = { subject: subject.id, ...ancestorIds };
      PEDIGREE_RELATIONS.forEach(([ownerKey, relationField, parentKey]) => {
        const ownerId = allIds[ownerKey];
        if (!ownerId) return;
        const owner = state.animals.find((animal) => animal.id === ownerId);
        if (owner) owner[relationField] = allIds[parentKey] || "";
      });

      state.pedigrees.push({
        id: uid("pedigree"),
        subjectAnimalId: subject.id,
        ancestorIds,
        sourceNotes: String(fd.get("sourceNotes") || "").trim(),
        notes: String(fd.get("notes") || "").trim(),
        fileName: sourceDocument?.fileName || "Manual pedigree",
        mimeType: sourceDocument?.mimeType || "",
        fileSize: sourceDocument?.size || 0,
        sourceDataUrl: sourceDocument?.dataUrl || "",
        importedAt: now,
        mode: "guided-manual-review",
        builderVersion: "0.2.1"
      });

      if (draftId) state.pedigreeDrafts = state.pedigreeDrafts.filter((item) => item.id !== draftId);
      recordActivity(`Completed a pedigree for ${subject.name}.`, "pedigree");

      const estimatedBytes = new Blob([JSON.stringify(state)]).size;
      if (estimatedBytes > 4_000_000) {
        throw new Error("This pedigree would exceed the safe local-storage limit.");
      }
      if (!saveState("Pedigree saved.")) throw new Error("The pedigree could not be stored.");

      closeModal();
      navigate("pedigrees");
    } catch (error) {
      state = backupState;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      toast(error.message || "The pedigree could not be saved.", "error");
    }
  }

      reader.readAsDataURL(file);

  function openFeedbackForm() {

      ["pedigrees", "Pedigrees"],

    const deviceSummary = [
      navigator.userAgent,

    ].join(" | ");

    openModal("Send tester feedback", `
      <form id="feedback-form" action="https://formspree.io/f/xpqvpwwb" method="POST">
        <input type="hidden" name="_subject" value="New HerdHarbor tester feedback">
        <input type="hidden" name="app_version" value="HerdHarbor Pre-Alpha v0.2.1">

        <input type="hidden" name="device_details" value="${esc(deviceSummary)}">

        <div class="form-grid two">
          ${field("Tester name", "tester_name", state.profile?.ownerName || "", true)}
          ${field("Email", "email", state.profile?.email || "", true, "email")}
          ${selectField(
            "Feedback type",
            "feedback_type",
            ["Bug", "Confusing workflow", "Feature request", "Missing field", "Mobile display issue", "Other"],
            "Bug",
            true
          )}
          <label>App section
            <select name="app_section" required>
              ${routeOptions.map(([value, label]) =>
                `<option value="${value}" ${value === currentRoute ? "selected" : ""}>${label}</option>`
              ).join("")}
            </select>
          </label>
        </div>

        ${field("Short title", "title", "", true)}
        ${textareaField(
          "What happened, or what would you like changed?",
          "details",
          "",
          true
        )}
        ${textareaField(
          "Steps to reproduce the problem",
          "steps_to_reproduce",
          ""
        )}
        ${textareaField(
          "Screenshot, error message, or additional description",
          "screenshot_description",
          ""
        )}

        <label>
          Device type
          <select name="device_type" required>
            <option value="">Choose one</option>
            <option>Phone</option>
            <option>Tablet</option>
            <option>Desktop or laptop</option>
            <option>Other</option>
          </select>
        </label>

        <label style="display:flex;grid-template-columns:auto 1fr;align-items:flex-start;gap:10px">
          <input type="checkbox" name="permission_to_contact" value="Yes" style="width:18px;height:18px;margin-top:2px">
          <span>You may contact me about this feedback.</span>
        </label>

        <p class="feedback-privacy">
          This form sends the information above, the current app page, and basic browser/device details to the HerdHarbor tester-feedback inbox. It does not send your livestock records.
        </p>

        <div class="modal-actions">
          <button type="button" class="button button-ghost" id="cancel-feedback">Cancel</button>
          <button type="submit" class="button button-primary" id="submit-feedback">Send feedback</button>
        </div>
        <p class="feedback-status" id="feedback-status" role="status" aria-live="polite"></p>
      </form>
    `, "Private tester feedback");

    $("#cancel-feedback").addEventListener("click", closeModal);

    $("#feedback-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      if (!form.reportValidity()) return;

      const button = $("#submit-feedback");
      const status = $("#feedback-status");
      const originalText = button.textContent;

      button.disabled = true;
      button.textContent = "Sending…";
      status.className = "feedback-status";
      status.textContent = "Sending your feedback…";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          const message = payload?.errors?.map((item) => item.message).join(", ")
            || "The feedback could not be submitted.";
          throw new Error(message);
        }

        status.className = "feedback-status success";
        status.textContent = "Thank you—your feedback was submitted.";
        recordActivity("Submitted tester feedback.", "feedback");
        saveState();

        setTimeout(() => {
          closeModal();
          toast("Feedback sent. Thank you.", "success");
        }, 900);
      } catch (error) {
        status.className = "feedback-status error";
        status.textContent = `${error.message || "Submission failed."} You can also email hello@herdharbor.com.`;
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    });
  }

  function openModal(title, content, kicker = "HerdHarbor") {
    $(".modal").classList.remove("modal-wide");

    $("#modal-kicker").textContent = kicker;
    $("#modal-content").innerHTML = content;
    $("#modal-backdrop").classList.remove("hidden");

  function closeModal() {
    $(".modal").classList.remove("modal-wide");
    $("#modal-backdrop").classList.add("hidden");
    $("#modal-backdrop").setAttribute("aria-hidden", "true");
    $("#modal-content").innerHTML = "";
  }

  function field(label, name, value = "", required = false, type = "text") {
    const extra = type === "number" ? 'min="0" step="0.01"' : "";
    return `<label>${esc(label)}<input type="${type}" name="${name}" value="${esc(value ?? "")}" ${required ? "required" : ""} ${extra}></label>`;
  }

  function textareaField(label, name, value = "", required = false) {
    return `<label>${esc(label)}<textarea name="${name}" ${required ? "required" : ""}>${esc(value ?? "")}</textarea></label>`;
  }

  function selectField(label, name, options, selected = "", required = false) {
    return `<label>${esc(label)}<select name="${name}" ${required ? "required" : ""}>
      ${required ? "" : '<option value="">None / not set</option>'}
      ${options.map((option) => `<option value="${esc(option)}" ${option === selected ? "selected" : ""}>${esc(option)}</option>`).join("")}
    </select></label>`;
  }

  function selectAnimalField(label, name, selected = "", sex = "", required = false) {
    const animals = state.animals.filter((a) => !sex || a.sex === sex);
    return `<label>${esc(label)}<select name="${name}" ${required ? "required" : ""}>
      <option value="">${required ? "Choose an animal" : "None / not set"}</option>
      ${animals.map((a) => `<option value="${a.id}" ${a.id === selected ? "selected" : ""}>${esc(a.name)}${a.tag ? ` · ${esc(a.tag)}` : ""}</option>`).join("")}
    </select></label>`;
  }

  function exportData() {
    const payload = JSON.stringify({
      app: "HerdHarbor Pre-Alpha",
      version: "0.2.0",
      exportedAt: new Date().toISOString(),
      data: state
    }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `herdharbor-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast("Backup downloaded.", "success");
  }

  async function importData(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      const imported = parsed.data || parsed;
      if (!imported.profile || !Array.isArray(imported.animals)) throw new Error("Invalid backup structure.");
      if (!confirm("Replace current local data with this backup?")) return;
      state = {
        ...structuredClone(defaultState),
        ...imported,
        pedigreeDrafts: Array.isArray(imported.pedigreeDrafts) ? imported.pedigreeDrafts : [],
        settings: { ...defaultState.settings, ...(imported.settings || {}) }
      };
      saveState("Backup imported.");
      applyTheme(state.settings.theme || "system", false);
      applySidebarState(false);
      showApp();
    } catch (error) {
      toast(error.message || "Could not import backup.", "error");
    } finally {
      event.target.value = "";
    }
  }

  function clearData() {
    if (!confirm("Clear every local HerdHarbor record on this device?")) return;
    if (!confirm("This cannot be undone unless you exported a backup. Continue?")) return;
    localStorage.removeItem(STORAGE_KEY);
    state = structuredClone(defaultState);
    currentRoute = "dashboard";
    showOnboarding();
    toast("Local data cleared.");
  }

  initialize();
})();
  </script>
</body>
</html>
